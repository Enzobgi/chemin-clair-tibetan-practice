name: Clean macOS metadata

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/cleanup-macos.yml

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Remove metadata files
        shell: bash
        run: |
          find . -name '._*' -type f -delete
          grep -qxF '._*' .gitignore || echo '._*' >> .gitignore
          rm -f .github/workflows/cleanup-macos.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Clean macOS metadata files'
          git push origin HEAD:main
