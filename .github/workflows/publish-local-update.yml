name: Publish local multi-account update

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/publish-local-update.yml

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply prepared update
        shell: bash
        run: |
          printf '%s' '' | base64 --decode > /tmp/chemin-clair-update.tar.gz
          tar -xzf /tmp/chemin-clair-update.tar.gz -C .
          rm -f .github/workflows/publish-local-update.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Add multi-account cloud sync'
          git push origin HEAD:main
