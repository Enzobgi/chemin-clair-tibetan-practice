name: Codex apply Chemin Clair patch

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/codex-apply-chemin-clair-patch.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-local-patch:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Stop if patch is already present
        run: |
          if grep -q 'chemin-clair-v19' sw.js && test -f account-bar.js; then
            echo "Patch already present."
            exit 0
          fi
      - name: Apply Codex patch
        run: |
          cat > /tmp/codex-chemin-clair.patch <<'CODEX_PATCH_END_20260627'
diff --git a/account-bar.js b/account-bar.js
new file mode 100644
index 0000000..5b32d17
--- /dev/null
+++ b/account-bar.js
@@ -0,0 +1,58 @@
+(() => {
+  const ensureBar = () => {
+    let bar = document.getElementById("topAccountBar");
+    if (bar) return bar;
+    const main = document.querySelector("main");
+    if (!main) return null;
+    bar = document.createElement("header");
+    bar.className = "top-account-bar";
+    bar.id = "topAccountBar";
+    bar.setAttribute("aria-label", "Compte");
+    main.prepend(bar);
+    return bar;
+  };
+
+  const accountName = (panel) => panel?.querySelector("strong")?.textContent?.trim() || "Compte";
+  const accountStatus = (panel) => panel?.querySelector(".sync-line")?.textContent?.replace(/\s+/g, " ").trim() || "Compte actif";
+
+  const relayClick = (targetId) => {
+    const target = document.getElementById(targetId);
+    if (target) target.click();
+  };
+
+  const render = () => {
+    const bar = ensureBar();
+    const panel = document.getElementById("accountPanel");
+    if (!bar || !panel) return;
+    const connected = Boolean(document.getElementById("logoutBtn"));
+    if (!connected) {
+      bar.innerHTML = `
+        <div>
+          <span class="eyebrow">Compte</span>
+          <strong>Mode local</strong>
+        </div>
+        <button class="primary-btn" id="topAuthBtn" type="button">Se connecter</button>
+      `;
+      document.getElementById("topAuthBtn")?.addEventListener("click", () => relayClick("openAuthBtn"));
+      return;
+    }
+    bar.innerHTML = `
+      <div>
+        <span class="eyebrow">Compte</span>
+        <strong>${accountName(panel)}</strong>
+        <span>${accountStatus(panel)}</span>
+      </div>
+      <button class="ghost-btn danger-btn" id="topLogoutBtn" type="button">Se deconnecter</button>
+    `;
+    document.getElementById("topLogoutBtn")?.addEventListener("click", () => relayClick("logoutBtn"));
+  };
+
+  const boot = () => {
+    render();
+    const panel = document.getElementById("accountPanel");
+    if (panel) new MutationObserver(render).observe(panel, { childList: true, subtree: true });
+  };
+
+  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", boot);
+  else boot();
+})();
